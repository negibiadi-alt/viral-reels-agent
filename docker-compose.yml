services:
  app:
    build: .
    container_name: viral-reels-app
    env_file: .env
    volumes:
      - ./storage:/app/storage
      - ./secrets:/app/secrets
    ports:
      - "8000:8000"
    depends_on:
      - postgres
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: viral-reels-db
    environment:
      POSTGRES_USER: viral
      POSTGRES_PASSWORD: viral
      POSTGRES_DB: viral_reels
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
