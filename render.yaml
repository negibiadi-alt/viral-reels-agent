services:
  - type: web
    name: viral-reels-agent
    runtime: docker
    region: frankfurt
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APIFY_TOKEN
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_APPROVER_CHAT_ID
        sync: false
      - key: IG_USER_ID
        sync: false
      - key: IG_ACCESS_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: viral-reels-db
          property: connectionString
      - key: TIMEZONE
        value: Europe/Istanbul
      - key: DRY_RUN
        value: "true"
      - key: DAILY_CANDIDATES
        value: "5"

databases:
  - name: viral-reels-db
    region: frankfurt
    plan: free
